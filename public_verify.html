<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Certificate - CertChain Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--card:#1a2236;--border:#1e3a5f;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:500px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.3)}
.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#3b82f6,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:30px}
.status-badge{display:inline-block;padding:8px 20px;border-radius:30px;font-weight:800;font-size:.9rem;margin-bottom:25px;text-transform:uppercase;letter-spacing:1px}
.valid{background:rgba(34,197,94,0.15);color:var(--green)}
.revoked{background:rgba(239,68,68,0.15);color:var(--red)}
.notfound{background:rgba(100,116,139,0.15);color:var(--muted)}
.detail-box{text-align:left;background:rgba(255,255,255,0.03);padding:25px;border-radius:12px;border:1px solid var(--border)}
.row{display:flex;justify-content:space-between;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.row:last-child{border:none;margin:0;padding:0}
.label{color:var(--muted);font-size:.75rem;font-weight:700;text-transform:uppercase}
.value{font-weight:600;font-size:.95rem}
.hash{font-family:monospace;font-size:.75rem;word-break:break-all;color:var(--accent);margin-top:10px;display:block}
.footer{margin-top:30px;color:var(--muted);font-size:.8rem}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="mainCard">
  <div class="logo">🔐 CertChain Pro</div>
  <div id="loading"><div class="spinner"></div><p>Verifying Blockchain Ledger...</p></div>
  <div id="content" style="display:none"></div>
</div>

<script>
async function verify() {
  const hash = window.location.pathname.split('/').pop();
  try {
    const res = await fetch(`/api/certificate/${hash}`);
    const d = await res.json();
    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';

    if (!d.success) {
      content.innerHTML = `
        <div class="status-badge notfound">⚠️ Not Found</div>
        <p>No certificate was found on the blockchain with this hash.</p>
        <span class="hash">${hash}</span>
      `;
      return;
    }

    const c = d.data;
    content.innerHTML = `
      <div class="status-badge ${c.isValid ? 'valid' : 'revoked'}">
        ${c.isValid ? '✅ Authenticated' : '❌ Revoked'}
      </div>
      <div class="detail-box">
        <div class="row"><span class="label">Recipient</span><span class="value">${c.studentName}</span></div>
        <div class="row"><span class="label">Certification</span><span class="value">${c.course}</span></div>
        <div class="row"><span class="label">Issue Date</span><span class="value">${new Date(c.issuedDate).toLocaleDateString(undefined, {year:'numeric',month:'long',day:'numeric'})}</span></div>
      </div>
      <div style="margin-top:20px;text-align:left">
        <span class="label">Blockchain Hash</span>
        <span class="hash">${c.hash}</span>
      </div>
    `;
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--red)">Connection Error</p>';
  }
}
verify();
</script>
</body>
</html>
